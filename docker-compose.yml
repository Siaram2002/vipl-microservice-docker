services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DATABASE}
      TZ: ${TZ}
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --max_connections=300
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT}:6379"
    networks:
      - micro_net
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  eureka-server:
    image: badulla2003/eureka-server:latest
    container_name: eureka-server
    restart: always
    ports:
      - "${EUREKA_HOST_PORT}:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_HOSTNAME: eureka-server
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_SELF_PRESERVATION: ${EUREKA_SELF_PRESERVATION}
      EUREKA_EVICTION_INTERVAL_MS: ${EUREKA_EVICTION_INTERVAL_MS}
      EUREKA_RESPONSE_CACHE_UPDATE_INTERVAL_MS: ${EUREKA_RESPONSE_CACHE_UPDATE_INTERVAL_MS}
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  auth-service:
    image: badulla2003/auth-service:latest
    container_name: auth-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "${AUTH_HOST_PORT}:8099"
    environment:
      SERVER_PORT: 8099
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${AUTH_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_REGISTER: ${EUREKA_REGISTER}
      EUREKA_FETCH: ${EUREKA_FETCH}
      API_GATEWAY_SECRET_KEY: ${API_GATEWAY_SECRET_KEY}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8099/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  cms-service:
    image: badulla2003/cms-service:latest
    container_name: cms-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "${CMS_HOST_PORT}:8082"
    environment:
      SERVER_PORT: 8082
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${CMS_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_REGISTER: ${EUREKA_REGISTER}
      EUREKA_FETCH: ${EUREKA_FETCH}
      API_GATEWAY_SECRET_KEY: ${API_GATEWAY_SECRET_KEY}
      FILE_UPLOAD_BASE_PATH: /app/uploads
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
    volumes:
      - cms_uploads:/app/uploads
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  cms-transport-service:
    image: badulla2003/cms-transport-service:latest
    container_name: cms-transport-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "${CMS_TRANSPORT_HOST_PORT}:8086"
    environment:
      SERVER_PORT: 8086
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${CMS_TRANSPORT_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_REGISTER: ${EUREKA_REGISTER}
      EUREKA_FETCH: ${EUREKA_FETCH}
      API_GATEWAY_SECRET_KEY: ${API_GATEWAY_SECRET_KEY}
      FILE_UPLOAD_BASE_PATH: /app/uploads
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      CAMPUS_LATITUDE: ${CAMPUS_LATITUDE}
      CAMPUS_LONGITUDE: ${CAMPUS_LONGITUDE}
      CAMPUS_ALLOWED_RADIUS_METERS: ${CAMPUS_ALLOWED_RADIUS_METERS}
    volumes:
      - transport_uploads:/app/uploads
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  notification-service:
    image: badulla2003/notification-service:latest
    container_name: notification-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "${NOTIFICATION_HOST_PORT}:8088"
    environment:
      SERVER_PORT: 8088
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_REGISTER: ${EUREKA_REGISTER}
      EUREKA_FETCH: ${EUREKA_FETCH}
      API_GATEWAY_SECRET_KEY: ${API_GATEWAY_SECRET_KEY}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TASK_EXECUTION_CORE_SIZE: ${TASK_EXECUTION_CORE_SIZE}
      TASK_EXECUTION_MAX_SIZE: ${TASK_EXECUTION_MAX_SIZE}
      TASK_EXECUTION_QUEUE_CAPACITY: ${TASK_EXECUTION_QUEUE_CAPACITY}
      ASYNC_CORE_POOL_SIZE: ${ASYNC_CORE_POOL_SIZE}
      ASYNC_MAX_POOL_SIZE: ${ASYNC_MAX_POOL_SIZE}
      ASYNC_QUEUE_CAPACITY: ${ASYNC_QUEUE_CAPACITY}
      NOTIFICATION_DEFAULT_CHANNELS: ${NOTIFICATION_DEFAULT_CHANNELS}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS}
      NOTIFICATION_RETRY_DELAY_MS: ${NOTIFICATION_RETRY_DELAY_MS}
      COLLEGE_NAME: ${COLLEGE_NAME}
      COLLEGE_ADDRESS: ${COLLEGE_ADDRESS}
      COLLEGE_WEBSITE: ${COLLEGE_WEBSITE}
      COLLEGE_CONTACT_EMAIL: ${COLLEGE_CONTACT_EMAIL}
      COLLEGE_CONTACT_PHONE: ${COLLEGE_CONTACT_PHONE}
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8088/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  api-gateway:
    image: badulla2003/api-gateway:latest
    container_name: api-gateway
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      cms-service:
        condition: service_started
      cms-transport-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "${API_GATEWAY_HOST_PORT}:8080"
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      EUREKA_REGISTER: ${EUREKA_REGISTER}
      EUREKA_FETCH: ${EUREKA_FETCH}
      API_GATEWAY_SECRET_KEY: ${API_GATEWAY_SECRET_KEY}
    networks:
      - micro_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  micro_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  cms_uploads:
  transport_uploads: